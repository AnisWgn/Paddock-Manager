security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: false
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        - { path: ^/team/new, roles: ROLE_ADMIN }
        - { path: ^/team/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/team/\d+/delete, roles: ROLE_ADMIN }

        - { path: ^/driver/new, roles: ROLE_ADMIN }
        - { path: ^/driver/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/driver/\d+/delete, roles: ROLE_ADMIN }

        - { path: ^/driver-rating, roles: ROLE_ADMIN }
        - { path: ^/driver-rating/new, roles: ROLE_ADMIN }
        - { path: ^/driver-rating/\d+, roles: ROLE_ADMIN }
        - { path: ^/driver-rating/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/driver-rating/\d+/delete, roles: ROLE_ADMIN }
        - { path: ^/driver-rating/\d+/show, roles: ROLE_ADMIN }

        - { path: ^/game/new, roles: ROLE_ADMIN }
        - { path: ^/game/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/game/\d+/delete, roles: ROLE_ADMIN }

        - { path: ^/plateforme, roles: ROLE_ADMIN }
        - { path: ^/plateforme/new, roles: ROLE_ADMIN }
        - { path: ^/plateforme/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/plateforme/\d+/delete, roles: ROLE_ADMIN }
        - { path: ^/plateforme/\d+/show, roles: ROLE_ADMIN }

        - { path: ^/user$, roles: ROLE_ADMIN }
        - { path: ^/user/new, roles: ROLE_ADMIN }
        - { path: ^/user/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/user/\d+/delete, roles: ROLE_ADMIN }


        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }
        - { path: ^/user/\d+, roles: ROLE_USER }
        - { path: ^/user/\d+/show, roles: ROLE_USER }


when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
